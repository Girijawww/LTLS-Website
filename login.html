<!DOCTYPE html>

<html>

<head>

<title>LTLS Admin Login</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="login-box">

<h1>Admin Login</h1>

<form
action="/login"
method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button>

Login

</button>

</form>

</div>

</body>

</html>
